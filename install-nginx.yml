- name: Install and verify Nginx
  hosts: servers
  become: yes
  tasks:
    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Wait for Nginx service to stabilize
      wait_for:
        port: 80
        delay: 15
        timeout: 90

    - name: Check Nginx status
      command: systemctl status nginx
      register: nginx_status

    - debug:
        msg: "{{ nginx_status.stdout }}"

    - name: Verify Nginx with curl
      command: curl -I http://localhost
      register: curl_result

    - debug:
        msg: "Nginx HTTP response: {{ curl_result.stdout }}"
