---
- name: Install and Verify Nginx
  hosts: servers
  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Start nginx
      shell: |
        nginx || true

    - name: Wait for nginx
      wait_for:
        port: 80
        timeout: 60

    - name: Verify nginx homepage
      uri:
        url: http://localhost
        status_code: 200
      register: nginx_status

    - name: Display nginx result
      debug:
        msg: "HTTP Status = {{ nginx_status.status }}"
