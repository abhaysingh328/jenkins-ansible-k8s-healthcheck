apiVersion: apps/v1
kind: Deployment
metadata:
  name: ansible-node1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ansible-node1
  template:
    metadata:
      labels:
        app: ansible-node1
    spec:
      containers:
      - name: ansible-node1
        image: ubuntu:20.04
        command: ["/bin/bash", "-c"]
        args:
          - apt update &&
            apt install -y openssh-server ansible python3.9 python3-pip &&
            useradd -m -s /bin/bash ansibleuser &&
            echo "ansibleuser:ansibleuser" | chpasswd &&
            service ssh start &&
            tail -f /dev/null
        ports:
        - containerPort: 22
---
apiVersion: v1
kind: Service
metadata:
  name: ansible-node1-ssh
spec:
  selector:
    app: ansible-node1
  ports:
    - protocol: TCP
      port: 22
      targetPort: 22
      nodePort: 30222
  type: NodePort
---
