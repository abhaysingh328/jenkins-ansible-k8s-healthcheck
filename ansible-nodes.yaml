apiVersion: v1
kind: Namespace
metadata:
  name: ansible-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ansible-node1
  namespace: ansible-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ansible-node1
  template:
    metadata:
      labels:
        app: ansible-node1
    spec:
      containers:
      - name: ansible-node1
        image: asabhaysingh328/ansible-node:latest
        ports:
        - containerPort: 22
        readinessProbe:
          tcpSocket:
            port: 22
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ansible-node1-ssh
  namespace: ansible-lab
spec:
  selector:
    app: ansible-node1
  ports:
    - protocol: TCP
      port: 22
      targetPort: 22
      nodePort: 30222
  type: NodePort
---
